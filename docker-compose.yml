services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    command: postgres -c max_connections=200
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barongsai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barongsai}
      POSTGRES_DB: ${POSTGRES_DB:-barongsai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barongsai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-barongsai}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-barongsai}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Load Balancer ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      barongsai:
        condition: service_healthy
    restart: unless-stopped

  # --- Backend (scalable) ---
  barongsai:
    build: .
    expose:
      - "8000"
    deploy:
      replicas: ${BGS_REPLICAS:-3}
    env_file:
      - .env
    environment:
      BGS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-barongsai}:${POSTGRES_PASSWORD:-barongsai}@postgres:5432/${POSTGRES_DB:-barongsai}
      BGS_REDIS_URL: redis://:${REDIS_PASSWORD:-barongsai}@redis:6379/0
      BGS_USER_AUTH_ENABLED: "true"
      BGS_JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      BGS_RATE_LIMIT_DISTRIBUTED: "true"
      BGS_JOB_QUEUE_ENABLED: "true"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # --- Background Worker (ARQ) ---
  barongsai-worker:
    build: .
    command: python -m arq src.applications.search_agent.worker.WorkerSettings
    env_file:
      - .env
    environment:
      BGS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-barongsai}:${POSTGRES_PASSWORD:-barongsai}@postgres:5432/${POSTGRES_DB:-barongsai}
      BGS_REDIS_URL: redis://:${REDIS_PASSWORD:-barongsai}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Frontend (dev) ---
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://nginx:80
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
